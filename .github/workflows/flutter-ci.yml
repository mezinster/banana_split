name: Flutter CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'banana_split_flutter/**'
      - '.github/workflows/flutter-ci.yml'
  pull_request:
    branches: [main, master, develop]
    paths:
      - 'banana_split_flutter/**'
      - '.github/workflows/flutter-ci.yml'
  workflow_dispatch:
    inputs:
      build_debug_apk:
        description: 'Build debug APK'
        required: false
        type: boolean
        default: true
      build_debug_windows:
        description: 'Build debug Windows'
        required: false
        type: boolean
        default: true

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: banana_split_flutter

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

  build-debug-android:
    name: Build Debug APK
    needs: analyze-and-test
    if: github.event_name == 'workflow_dispatch' && inputs.build_debug_apk
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: banana_split_flutter

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: banana_split_flutter/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

  build-debug-windows:
    name: Build Debug Windows
    needs: analyze-and-test
    if: github.event_name == 'workflow_dispatch' && inputs.build_debug_windows
    runs-on: windows-latest
    defaults:
      run:
        working-directory: banana_split_flutter

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug Windows
        run: flutter build windows --debug

      - name: Upload debug Windows build
        uses: actions/upload-artifact@v4
        with:
          name: debug-windows
          path: banana_split_flutter/build/windows/x64/runner/Debug/
          retention-days: 7
