Categories:
  - Security
  - System
License: GPL-3.0-only
AuthorName: mezinster
SourceCode: https://github.com/mezinster/banana_split
IssueTracker: https://github.com/mezinster/banana_split/issues

AutoName: Banana Split

RepoType: git
Repo: https://github.com/mezinster/banana_split.git

Builds:
  - versionName: 0.8.0
    versionCode: 1
    commit: TBD
    subdir: banana_split_flutter
    sudo:
      - echo 'deb http://deb.debian.org/debian bookworm main' > /etc/apt/sources.list.d/bookworm.list
      - apt-get update
      - apt-get install -y openjdk-17-jdk-headless
      - update-java-alternatives -a
    output: build/app/outputs/flutter-apk/app-release.apk
    srclibs:
      - flutter@stable
    rm:
      - banana_split_flutter/ios
    prebuild:
      - flutterVersion=$(sed -n -E "s/.*FLUTTER_VERSION:\ '(.*)'/\1/p" ../.github/workflows/release.yml)
      - '[[ $flutterVersion ]]'
      - git -C $$flutter$$ checkout -f $flutterVersion
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get
    scandelete:
      - .pub-cache
    build:
      - export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter gen-l10n
      - $$flutter$$/bin/flutter build apk --release

AntiFeatures:
  NonFreeDep:
    en-US: |
      Uses Google ML Kit (via mobile_scanner package) for QR code scanning on Android.
      ML Kit is a proprietary Google library bundled in the APK.
      A pure open-source alternative (zxing2) is used on Windows/Linux.

AutoUpdateMode: Version
UpdateCheckMode: Tags
UpdateCheckData: banana_split_flutter/pubspec.yaml|version:\s.+\+(\d+)|.|version:\s(.+)\+
CurrentVersion: 0.8.0
CurrentVersionCode: 1
